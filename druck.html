<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacing Tool</title>

<style>
body{
font-family:-apple-system,system-ui;
background:#f2f2f7;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

button{
padding:12px;
border:none;
border-radius:10px;
font-weight:700;
margin-top:6px;
cursor:pointer;
}

.btn-load{background:#007aff;color:white;width:100%}
.btn-micro{background:#ffcc00}
.btn-rest{background:#34c759;color:white}

.status{
font-size:18px;
font-weight:bold;
margin-top:6px;
}

.warn{
color:#ff3b30;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h3>Status</h3>

<div class="status">Limit: <span id="limit">0</span></div>
<div class="status">Rest: <span id="rest">0</span></div>
<div class="status">Block: <span id="block">0</span></div>
<div class="status">Pausezeit: <span id="pauseTime">0</span> min</div>

<div id="warning" class="warn"></div>

</div>

<div class="card">

<h3>Morgenwert</h3>

<input id="sleep" type="number" placeholder="Schlafwert">
<input id="feeling" type="number" placeholder="Gefühl (+ / -)">
<button onclick="startDay()">Tag starten</button>

</div>

<div class="card">

<h3>Belastung</h3>

<button class="btn-load" onclick="addLoad(2)">Leichte Aktivität (2)</button>
<button class="btn-load" onclick="addLoad(5)">Bewegung (5)</button>
<button class="btn-load" onclick="addLoad(10)">Konzentration (10)</button>

</div>

<div class="card">

<h3>Pausen</h3>

<button class="btn-micro" onclick="microPause()">☕ Mikro-Pause</button>
<button class="btn-rest" onclick="restPause()">🛋 Erholungs-Pause</button>

</div>

<script>

let state={
limit:0,
rest:0,
block:0,
loads:[],
lastPause:Date.now()
}

function startDay(){

let s=parseFloat(document.getElementById("sleep").value)
let f=parseFloat(document.getElementById("feeling").value)

if(isNaN(s)||isNaN(f))return

state.limit=s+f
state.rest=state.limit
state.block=0
state.loads=[]
state.lastPause=Date.now()

update()

}

function addLoad(v){

state.rest=Math.max(0,state.rest-v)
state.block+=v

state.loads.push({
time:Date.now(),
val:v
})

update()

}

function microPause(){

state.block=Math.max(0,state.block-10)
state.rest=Math.min(state.limit,state.rest+1)

state.lastPause=Date.now()

update()

}

function restPause(){

state.block=0
state.rest=Math.min(state.limit,state.rest+3)

state.lastPause=Date.now()

update()

}

function dynamicLimits(){

let p=(state.rest/state.limit)*100

if(p>70)return{warn:22,stop:32}
if(p>40)return{warn:18,stop:28}
return{warn:14,stop:22}

}

function loadDensity(){

let now=Date.now()

let recent=state.loads.filter(l=>now-l.time<900000)

let sum=0

recent.forEach(l=>sum+=l.val)

return sum

}

function update(){

document.getElementById("limit").textContent=state.limit
document.getElementById("rest").textContent=state.rest
document.getElementById("block").textContent=state.block

let minutes=Math.floor((Date.now()-state.lastPause)/60000)

document.getElementById("pauseTime").textContent=minutes

let lim=dynamicLimits()

let warn=""

if(state.block>=lim.stop){
warn="⚠ Pause erzwingen"
}

else if(state.block>=lim.warn){
warn="Pause empfohlen"
}

if(loadDensity()>12){
warn="⚠ Hohe Belastungsdichte – Mikro-Pause"
}

if(
(state.rest/state.limit)<0.35 &&
state.block>15 &&
minutes>40
){
warn="⚠ Crashrisiko – sofort Pause"
}

document.getElementById("warning").textContent=warn

}

setInterval(update,30000)

</script>

</body>
</html>
